# SPDX-License-Identifier: Apache-2.0
# Per #1513 T5: build, package-check, and verify the published wheel does
# not reintroduce generator-content tells. Local hooks cover the source
# tree; this workflow covers the artifact.
name: Wheel-Hygiene

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'python/**'
      - 'bindings/**'
      - 'CMakeLists.txt'
      - 'tools/check_generated_content_tells.sh'

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip build cibuildwheel twine
      - name: Build manylinux_2_28 wheels
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_SKIP: "*musllinux*"
          CIBW_TEST_COMMAND: >
            python -c "import navatala_gpu;
            assert navatala_gpu.get_capabilities().get('extension_loaded')"
        run: |
          python -m cibuildwheel python --output-dir wheelhouse
      - name: Build standalone sdist
        run: |
          cd python
          python -m build --sdist
      - name: twine check
        run: |
          twine check wheelhouse/*.whl python/dist/*.tar.gz
      - name: Wheel content hygiene
        run: |
          set -euo pipefail
          shopt -s nullglob
          fails=0
          for whl in wheelhouse/*.whl; do
              echo "::group::Inspect $whl"
              # Use python to list wheel contents portably.
              python - "$whl" <<'PY'
          import sys
          import zipfile

          sentinels = ['generated', 'codegen', 'CodeGenGPU', 'GPU.GPUType', 'Calculations_GPU', '__pycache__', '.pyc', '.pytest_cache']
          fails = 0
          with zipfile.ZipFile(sys.argv[1]) as z:
              for name in z.namelist():
                  for s in sentinels:
                      if s in name:
                          print(f'FAIL: {name!r} matches sentinel {s!r}', file=sys.stderr)
                          fails += 1
                          break
          sys.exit(1 if fails else 0)
          PY
              echo "::endgroup::"
          done
      - name: Install + smoke test in fresh venv
        run: |
          set -euo pipefail
          python -m venv /tmp/whltest-venv
          source /tmp/whltest-venv/bin/activate
          pip install --upgrade pip
          pip install wheelhouse/navatala_gpu-*-cp311-*.whl
          python - <<'PY'
          import navatala_gpu
          print('version', navatala_gpu.__version__)
          print('abi_version', navatala_gpu.__abi_version__)
          print('manifest_id', navatala_gpu._meta.manifest_id())
          PY
      - name: Install sdist + smoke test in fresh venv
        run: |
          set -euo pipefail
          python -m venv /tmp/sdisttest-venv
          source /tmp/sdisttest-venv/bin/activate
          pip install --upgrade pip
          pip install python/dist/navatala_gpu-*.tar.gz
          python - <<'PY'
          import navatala_gpu
          print('version', navatala_gpu.__version__)
          print('abi_version', navatala_gpu.__abi_version__)
          print('manifest_id', navatala_gpu._meta.manifest_id())
          PY
      - name: Run acceptance checks on installed tree
        run: |
          if [ -x tools/check_generated_content_tells.sh ]; then
              tools/check_generated_content_tells.sh
          else
              echo "::warning::tools/check_generated_content_tells.sh not present in checkout — skipped"
          fi
          if [ -x tools/check_release_hygiene.py ]; then
              python tools/check_release_hygiene.py .
          else
              echo "::warning::tools/check_release_hygiene.py not present in checkout — skipped"
          fi
