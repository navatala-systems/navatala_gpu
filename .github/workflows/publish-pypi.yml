# SPDX-License-Identifier: Apache-2.0
name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Publishing target'
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip cibuildwheel twine
      - name: Build manylinux_2_28 wheels
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_SKIP: "*musllinux*"
          CIBW_TEST_COMMAND: >
            python -c "import navatala_gpu;
            assert navatala_gpu.get_capabilities().get('extension_loaded')"
        run: |
          python -m cibuildwheel python --output-dir wheelhouse
      - name: Twine metadata check
        run: |
          twine check wheelhouse/*
      - name: Install smoke test
        run: |
          set -euo pipefail
          python -m venv /tmp/navatala-gpu-smoke
          source /tmp/navatala-gpu-smoke/bin/activate
          pip install --upgrade pip
          pip install wheelhouse/navatala_gpu-*-cp311-*.whl
          python - <<'PY'
          import navatala_gpu
          print("version", navatala_gpu.__version__)
          print("abi_version", navatala_gpu.__abi_version__)
          print("manifest_id", navatala_gpu._meta.manifest_id())
          PY
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-manylinux-2-28-x86-64
          path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip build twine
      - name: Build standalone source distribution
        run: |
          cd python
          python -m build --sdist
          twine check dist/*.tar.gz
      - name: Install smoke test from sdist
        run: |
          set -euo pipefail
          python -m venv /tmp/navatala-gpu-sdist-smoke
          source /tmp/navatala-gpu-sdist-smoke/bin/activate
          pip install --upgrade pip
          pip install python/dist/navatala_gpu-*.tar.gz
          python - <<'PY'
          import navatala_gpu
          print("version", navatala_gpu.__version__)
          print("abi_version", navatala_gpu.__abi_version__)
          print("manifest_id", navatala_gpu._meta.manifest_id())
          PY
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/*.tar.gz

  publish-testpypi:
    needs: [build-wheels, build-sdist]
    if: ${{ github.event.inputs.target == 'testpypi' }}
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  publish-pypi:
    needs: [build-wheels, build-sdist]
    if: ${{ github.event.inputs.target == 'pypi' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
