# SPDX-License-Identifier: Apache-2.0
# Per release-hardening §1.8 of the cleanup tracker. This workflow is the authoritative
# enforcement of the Regen-Manifest-Trailer policy: local hooks are best-effort
# and can be bypassed with `git commit --no-verify`.
name: Regen-Manifest-Trailer

on:
  pull_request:
    branches: [ main, master ]

jobs:
  check-trailer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce trailer policy on protected paths
        run: |
          base_ref="origin/${{ github.base_ref }}"
          ./tools/check_regen_trailer.sh --ci "$base_ref"
